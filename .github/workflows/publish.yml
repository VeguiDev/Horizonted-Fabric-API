name: Publish Maven to R2

on:
  push:
    branches:
      - master
      - dev
    tags:
      - "*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      CI: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Publish staging repo
        run: ./gradlew publish

      - name: Decide target repo path
        id: repo
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "path=releases" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF}" == refs/heads/master ]]; then
            echo "path=releases" >> $GITHUB_OUTPUT
          else
            echo "path=snapshots" >> $GITHUB_OUTPUT
          fi

      - name: Upload to R2
        run: |
          aws s3 sync build/staging-repo \
            s3://vegui-maven/${{ steps.repo.outputs.path }} \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --delete
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_KEY }}