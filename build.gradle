def testDependencies(project, List<String> depNames) {
    def deps = depNames.collect { depName ->
        project.dependencies.project(path: depName)
    }

    project.dependencies {
        deps.each {
            testmodImplementation it
        }
    }

}

repositories {
    mavenCentral()
    maven {
        name = "papermc-repo"
        url = "https://repo.papermc.io/repository/maven-public/"
    }
    maven {
        name = "Canvas"
        url = "https://maven.canvasmc.io/releases"
    }
}

subprojects {
    group = rootProject.group

    apply plugin: "java-library"
    apply plugin: "eclipse"
    apply plugin: "maven-publish"
    apply plugin: "io.canvasmc.weaver.userdev"
    apply plugin: "io.canvasmc.horizon"

    java {
        withSourcesJar()

        toolchain {
            languageVersion = JavaLanguageVersion.of(toolchainJavaVersion)
        }
    }

    repositories {
        mavenCentral()
        maven {
            name = "papermc-repo"
            url = "https://repo.papermc.io/repository/maven-public/"
        }
        maven {
            name = "Canvas"
            url = "https://maven.canvasmc.io/releases"
        }
    }

    dependencies {
        paperweight.paperDevBundle("1.21.8-R0.1-SNAPSHOT")

        horizon.horizonApi("1.0.0.49");

        testImplementation platform("org.junit:junit-bom:5.12.2")
        testImplementation "org.junit.jupiter:junit-jupiter-api"
        testRuntimeOnly "org.junit.jupiter:junit-jupiter-engine"
        testRuntimeOnly "org.junit.platform:junit-platform-launcher"
        testImplementation "org.mockito:mockito-core:5.15.2"
    }

    tasks.withType(Test).configureEach {
        useJUnitPlatform()
    }

    tasks.withType(JavaCompile).configureEach {
        options.encoding = 'UTF-8'

        if (targetJavaVersion >= 10 || JavaVersion.current().isJava10Compatible()) {
            options.release.set(targetJavaVersion)
        }
    }

    if (file("src/testmod").exists()) {
        sourceSets {
            testmod {
                java.srcDir("src/testmod/java")
                resources.srcDir("src/testmod/resources")
                compileClasspath += sourceSets.main.output + configurations.compileClasspath
                runtimeClasspath += output + compileClasspath + configurations.runtimeClasspath
            }
        }

        configurations.named("testmodImplementation") {
            extendsFrom(configurations.getByName("implementation"))
        }
        configurations.named("testmodCompileOnly") {
            extendsFrom(configurations.getByName("compileOnly"))
        }
        configurations.named("testmodRuntimeOnly") {
            extendsFrom(configurations.getByName("runtimeOnly"))
        }
        configurations.named("testmodAnnotationProcessor") {
            extendsFrom(configurations.getByName("annotationProcessor"))
        }

        dependencies {
            testmodImplementation sourceSets.main.output
        }

        tasks.register("testmodJar", Jar) {
            group = "build"
            description = "Assembles the testmod jar for ${project.path}"
            archiveClassifier.set("testmod")
            from(sourceSets.testmod.output)
        }

        tasks.register("buildWithTestmod") {
            group = "build"
            description = "Builds ${project.path} including the testmod jar"
            dependsOn(tasks.named("build"), tasks.named("testmodJar"))
        }
    }
    
    processResources {
        inputs.property('version', version)
        filteringCharset 'UTF-8'
        filesMatching('horizon.plugin.json') {
            expand version: version
        }
    }

    publishing {
        publications {
            mavenJava(MavenPublication) {
                from components.java
                artifactId = project.name

                pom {
                    name = project.name
                    description = "${project.name} module for Horizonted Fabric API"
                }
            }
        }

        repositories {
            configurePublishingRepositories(delegate)
        }
    }
}

dependencies {
    paperweight.paperDevBundle("1.21.8-R0.1-SNAPSHOT")
    horizon.horizonApi("1.0.0.49")

    includeMixinPlugin project(":fabric-api-base")
    includeMixinPlugin project(":fabric-command-api-v2")
    includeMixinPlugin project(":fabric-content-registries-v0")
    includeMixinPlugin project(":fabric-lifecycle-events-v1")
    includeMixinPlugin project(":fabric-registry-sync-v0")
    includeMixinPlugin project(":fabric-resource-loader-v0")
    includeMixinPlugin project(":fabric-networking-api-v1")
}

java {
    def javaVersion = JavaVersion.toVersion(targetJavaVersion)
    sourceCompatibility = javaVersion
    targetCompatibility = javaVersion
    withSourcesJar()
    toolchain.languageVersion = JavaLanguageVersion.of(toolchainJavaVersion)
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'

    if (targetJavaVersion >= 10 || JavaVersion.current().isJava10Compatible()) {
        options.release.set(targetJavaVersion)
    }
}

processResources {
    inputs.property('version', version)
    filteringCharset 'UTF-8'
    filesMatching('horizon.plugin.json') {
        expand version: version
    }
}

tasks.register("testmodJars") {
    group = "build"
    description = "Assembles all available testmod jars."
    dependsOn(subprojects.collect { subproject ->
        subproject.file("src/testmod").exists() ? subproject.tasks.named("testmodJar") : null
    }.findAll { it != null })
}

tasks.register("buildWithTestmods") {
    group = "build"
    description = "Builds the project and all available testmod jars."
    dependsOn(tasks.named("build"), tasks.named("testmodJars"))
}

publishing {
    publications {
        horizonPlugin(MavenPublication) {
            from components.java
            artifactId = runtimeArtifactId.get()

            pom {
                name = "Horizonted Fabric API"
                description = "Runtime Horizon plugin bundle for the Horizonted Fabric API modules"
            }
        }

        fabricApi(MavenPublication) {
            artifactId = aggregatorArtifactId.get()

            pom {
                name = "Horizonted Fabric API"
                description = "Aggregator POM for all published Horizonted Fabric API modules"
                packaging = "pom"

                withXml {
                    def depsNode = asNode().appendNode("dependencies")

                    subprojects.each { subproject ->
                        def dependencyNode = depsNode.appendNode("dependency")
                        dependencyNode.appendNode("groupId", subproject.group)
                        dependencyNode.appendNode("artifactId", subproject.name)
                        dependencyNode.appendNode("version", subproject.version)
                        dependencyNode.appendNode("scope", "compile")
                    }
                }
            }
        }
    }

    repositories {
        configurePublishingRepositories(delegate)
        maven {
            name = "staging"
            url = layout.buildDirectory.dir("staging-repo")
        }
    }
}
