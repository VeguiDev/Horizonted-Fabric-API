plugins {
    id "java-library"
    id "eclipse"
    id "maven-publish"
    id("io.canvasmc.weaver.userdev") version "2.3.12"
    id("io.canvasmc.horizon") version "1.0.0"
    id("xyz.jpenilla.run-paper") version "3.0.2"
}

def baseVersion = "1.0.0-SNAPSHOT"

group = providers.gradleProperty("publishedMavenGroup").orElse("dev.vegui.hfa").get()

def runNumber = providers.environmentVariable("GITHUB_RUN_NUMBER")
def commitHash = providers.environmentVariable("GITHUB_SHA")
        .map { it.substring(0, 7) }
        .orElse("local")
        .get()

version = runNumber.present && commitHash != "local"
        ? "${baseVersion}+${runNumber.get()}.${commitHash}"
        : "${baseVersion}+local"

import groovy.json.JsonSlurper
import java.net.http.HttpClient
import java.net.http.HttpRequest
import java.net.http.HttpResponse

def runtimeArtifactId = providers.gradleProperty("publishedRuntimeArtifactId").orElse("horizonted-fabric-api")
def aggregatorArtifactId = providers.gradleProperty("publishedAggregatorArtifactId").orElse("fabric-api")
def publishRepoUrl = providers.gradleProperty("publishRepoUrl")
def publishRepoUsername = providers.gradleProperty("publishRepoUsername")
def publishRepoPassword = providers.gradleProperty("publishRepoPassword")
def useLocalHorizonCore = providers.gradleProperty("useLocalHorizonCore").map { it.toBoolean() }.orElse(false).get()
def targetJavaVersion = 21
def toolchainJavaVersion = useLocalHorizonCore ? 25 : targetJavaVersion

def configurePublishingRepositories = { RepositoryHandler handler ->
    handler.mavenLocal()

    if (publishRepoUrl.present) {
        handler.maven {
            name = "publishTarget"
            url = uri(publishRepoUrl.get())

            if (publishRepoUsername.present && publishRepoPassword.present) {
                credentials {
                    username = publishRepoUsername.get()
                    password = publishRepoPassword.get()
                }
            }
        }
    }
}

def getSubprojectVersion(Project project) {

    def baseVersion = project.properties["${project.name}-version"]

    if (!baseVersion) {
        throw new NullPointerException("Could not find version for " + project.name)
    }

    def runNumber = project.providers.environmentVariable("GITHUB_RUN_NUMBER")

    if (!runNumber.present) {
        return baseVersion + "+local"
    }

    def commitHash = project.providers.environmentVariable("GITHUB_SHA")
            .map { it.substring(0, 7) }
            .orElse("local")
            .get()

    return baseVersion + "+" +
            runNumber.get() + "." +
            commitHash
}

